name: Build and Package Test

on:
  push: {}
  pull_request: {}

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.12'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: cd web && bun install

      - name: Build frontend and package application
        run: make package

      - name: Verify package artifacts
        run: |
          echo "Listing contents of the dist directory:"
          ls -l dist
          if [ ! -f dist/*.whl ] || [ ! -f dist/*.tar.gz ]; then
            echo "Build artifacts (.whl or .tar.gz) not found in dist/ directory!"
            exit 1
          fi
          echo "Package artifacts successfully created."
