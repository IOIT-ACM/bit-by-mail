name: Build and Package Test

on:
  push: {}
  pull_request: {}

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend and package application
        run: make package

      - name: Verify package artifacts
        run: |
          echo "Listing contents of the dist directory:"
          ls -l dist
          if [ ! -f dist/*.whl ] || [ ! -f dist/*.tar.gz ]; then
            echo "Build artifacts (.whl or .tar.gz) not found in dist/ directory!"
            exit 1
          fi
          echo "Package artifacts successfully created."
